<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shopee 全国売れ行き比較</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f2f2f2; font-family: -apple-system, "Hiragino Sans", sans-serif; color: #333; }
  #smd-head { position: sticky; top: 0; z-index: 10; background: #fff; padding: 12px 20px; border-bottom: 1px solid #e2e2e2;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  #smd-head h1 { margin: 0 14px 0 0; font-size: 18px; color: #ee4d2d; }
  .smd-seg { display: inline-flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  .smd-seg button { border: none; background: #fff; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #555; }
  .smd-seg button.on { background: #ee4d2d; color: #fff; }
  #smd-head select, #smd-head input[type=text] { padding: 6px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; }
  #smd-mode { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #eee; color: #666; }
  #smd-mode.live { background: #e8f5e9; color: #1b7f2e; }
  #smd-mode.snap { background: #e3f2fd; color: #1565c0; }
  #smd-gear { margin-left: auto; border: none; background: none; font-size: 18px; cursor: pointer; }
  #smd-summary { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 12px 20px 0; }
  .smd-tile { background: #fff; border-radius: 8px; padding: 8px 10px; font-size: 12px; border-top: 3px solid #ccc;
    box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .smd-tile.off { opacity: .45; }
  .smd-tilebody { margin-top: 4px; line-height: 1.5; }
  .smd-jpy { color: #b45309; font-weight: 600; }
  .smd-dim { color: #999; }
  .smd-err { color: #c0392b; font-size: 11px; }
  .smd-retry { margin-left: 4px; font-size: 11px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; }
  #smd-total { padding: 10px 20px 0; font-size: 13px; }
  #smd-gridstatus { padding: 6px 20px; font-size: 12px; color: #777; }
  #smd-grid { padding: 0 20px 30px; display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); grid-auto-rows: max-content; align-content: start; }
  .smd-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    cursor: pointer; position: relative; }
  .smd-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.18); }
  .smd-rank { position: absolute; top: 6px; left: 6px; z-index: 1; background: rgba(0,0,0,.65); color: #fff;
    font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .smd-cchip { position: absolute; top: 6px; right: 6px; z-index: 1; color: #fff; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; }
  .smd-imgwrap { position: relative; width: 100%; padding-top: 100%; background: #eee; }
  .smd-imgwrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .smd-body { padding: 8px 10px 10px; }
  .smd-name { font-size: 12px; line-height: 1.35; height: 2.7em; overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .smd-nums { margin-top: 6px; display: flex; justify-content: space-between; align-items: baseline; }
  .smd-units { font-size: 16px; font-weight: 700; color: #ee4d2d; }
  .smd-units small { font-size: 11px; font-weight: 400; color: #999; }
  .smd-sales { font-size: 12px; color: #555; }
  .smd-models { margin-top: 4px; font-size: 10px; color: #7a6ba7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .smd-jpyrow { font-size: 11px; color: #b45309; margin-top: 2px; }
  .smd-sub { margin-top: 4px; font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
  .smd-sub a { color: #2673dd; text-decoration: none; }
  #smd-empty { padding: 60px; text-align: center; color: #999; grid-column: 1/-1; line-height: 2; }
  /* 国別 縦カラム表示 */
  #smd-grid.smd-columns { display: flex; gap: 10px; align-items: stretch; overflow-x: auto;
    height: calc(100vh - 240px); min-height: 420px; }
  .smd-col { flex: 1 1 0; min-width: 185px; background: #fff; border-radius: 8px; display: flex;
    flex-direction: column; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .smd-colhead { padding: 8px 10px; border-top: 3px solid #ccc; border-bottom: 1px solid #eee; font-size: 12px; }
  .smd-colinfo { margin-top: 2px; line-height: 1.5; }
  .smd-colbody { flex: 1; overflow-y: auto; }
  .smd-item { display: flex; gap: 7px; padding: 7px 8px 7px 4px; border-bottom: 1px solid #f3f3f3;
    cursor: pointer; align-items: center; }
  .smd-item:hover { background: #fdf0ec; }
  .smd-itemrank { flex: none; width: 20px; font-size: 11px; font-weight: 700; color: #999; text-align: right; }
  .smd-item img { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; background: #eee; flex: none; }
  .smd-iteminfo { min-width: 0; }
  .smd-itemname { font-size: 11px; line-height: 1.3; max-height: 2.6em; overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .smd-itemstats { font-size: 11px; color: #555; margin-top: 2px; white-space: nowrap; }
  .smd-itemstats b { color: #ee4d2d; }
  .smd-colempty { padding: 30px 10px; text-align: center; color: #999; font-size: 12px; }
  /* 設定モーダル */
  #smd-modal { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.4); display: none;
    align-items: center; justify-content: center; }
  #smd-modal.open { display: flex; }
  #smd-modal .box { background: #fff; border-radius: 10px; padding: 20px 24px; width: 480px; max-width: 92vw; font-size: 13px; }
  #smd-modal h3 { margin: 0 0 12px; color: #ee4d2d; font-size: 15px; }
  #smd-modal label { display: block; margin: 10px 0 4px; color: #555; }
  #smd-modal input[type=text] { width: 100%; padding: 7px 9px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; }
  #smd-modal .row { margin-top: 14px; display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  #smd-modal button { padding: 7px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
  #smd-modal button.primary { background: #ee4d2d; border-color: #ee4d2d; color: #fff; }
  #smd-modal .note { color: #999; font-size: 11px; line-height: 1.6; margin-top: 8px; }
  #smd-modal .test { color: #1565c0; font-size: 12px; margin-right: auto; }
  @media (max-width: 1100px) { #smd-summary { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>
  <div id="smd-head">
    <h1>🌏 Shopee 全国売れ行き比較</h1>
    <span id="smd-mode">起動中...</span>
    <span class="smd-seg" id="smd-period">
      <button data-k="real_time">今日</button>
      <button data-k="yesterday">昨日</button>
      <button data-k="past7days">7日間</button>
      <button data-k="past30days" class="on">30日間</button>
    </span>
    <select id="smd-month"><option value="">月指定...</option></select>
    <span class="smd-seg" id="smd-metric">
      <button data-k="placed" class="on">注文ベース</button>
      <button data-k="confirmed">確定ベース</button>
    </span>
    <span class="smd-seg" id="smd-sort">
      <button data-k="units" class="on">販売数順</button>
      <button data-k="salesJpy">売上順(円換算)</button>
    </span>
    <span class="smd-seg" id="smd-view">
      <button data-k="grid" class="on">混合</button>
      <button data-k="columns">国別 縦</button>
      <button data-k="sku">SKU展開</button>
    </span>
    <input type="text" id="smd-search" placeholder="商品名・IDで絞り込み">
    <button id="smd-gear" title="設定">⚙️</button>
  </div>
  <div id="smd-summary"></div>
  <div id="smd-total"></div>
  <div id="smd-gridstatus"></div>
  <div id="smd-grid"></div>

  <div id="smd-modal"><div class="box">
    <h3>⚙️ 設定</h3>
    <label>GAS Web App URL（スナップショット保存先。空なら未使用）</label>
    <input type="text" id="set-gas" placeholder="https://script.google.com/macros/s/xxxx/exec">
    <label>アップロード用トークン（GASのsetup()で発行した値）</label>
    <input type="text" id="set-token" placeholder="token">
    <label><input type="checkbox" id="set-auto" checked> ライブ取得成功時に自動でスナップショットを保存</label>
    <div class="note">・ライブ取得（7か国のShopeeから直接）はTampermonkeyのブリッジuserscriptが入ったPCでのみ動きます<br>
      ・ブリッジ無しのPCは、保存済みスナップショットを表示します</div>
    <div class="row"><span class="test" id="set-test"></span>
      <button id="set-testbtn">接続テスト</button>
      <button id="set-cancel">閉じる</button>
      <button class="primary" id="set-save">保存</button></div>
  </div></div>

<script>
(function () {
  'use strict';

  // rateJpy: 現地通貨→円の概算レート。ズレてきたらここを直す
  const REGIONS = [
    { cc: 'PH', host: 'seller.shopee.ph',     tz: 8,  cur: '₱',   rateJpy: 2.7,    color: '#ee4d2d' },
    { cc: 'SG', host: 'seller.shopee.sg',     tz: 8,  cur: 'S$',  rateJpy: 115,    color: '#0f9d58' },
    { cc: 'MY', host: 'seller.shopee.com.my', tz: 8,  cur: 'RM',  rateJpy: 34,     color: '#1a73e8' },
    { cc: 'BR', host: 'seller.shopee.com.br', tz: -3, cur: 'R$',  rateJpy: 28,     color: '#f9a825' },
    { cc: 'VN', host: 'seller.shopee.vn',     tz: 7,  cur: '₫',   rateJpy: 0.0058, color: '#9c27b0' },
    { cc: 'TH', host: 'seller.shopee.co.th',  tz: 7,  cur: '฿',   rateJpy: 4.4,    color: '#e91e63' },
    { cc: 'TW', host: 'seller.shopee.tw',     tz: 8,  cur: 'NT$', rateJpy: 4.9,    color: '#00897b' },
  ];
  const PAGE_SIZE = 50;
  const MAX_PAGES = 20;
  const IMG_CDN = 'https://down-sg.img.susercontent.com/';

  // ---------------- 設定（localStorage） ----------------
  const settings = Object.assign({ gasUrl: '', token: '', auto: true },
    JSON.parse(localStorage.getItem('smdSettings') || '{}'));
  const saveSettings = () => localStorage.setItem('smdSettings', JSON.stringify(settings));

  // ---------------- ブリッジ（Tampermonkey userscript との postMessage 通信） ----------------
  let bridgeAvailable = false;
  const pendingReq = new Map();
  let reqSeq = 0;
  window.addEventListener('message', e => {
    const d = e.data;
    if (!d || e.source !== window) return;
    if (d.__smd === 'pong') { bridgeAvailable = true; return; }
    if (d.__smd === 'res' && pendingReq.has(d.id)) {
      const { resolve, reject, timer } = pendingReq.get(d.id);
      clearTimeout(timer);
      pendingReq.delete(d.id);
      if (d.ok) resolve(d.body); else reject(new Error(d.error || ('HTTP ' + d.status)));
    }
  });
  function bridgeRequest(method, url, data) {
    return new Promise((resolve, reject) => {
      const id = ++reqSeq;
      const timer = setTimeout(() => { pendingReq.delete(id); reject(new Error('timeout')); }, 35000);
      pendingReq.set(id, { resolve, reject, timer });
      window.postMessage({ __smd: 'req', id, method, url, data }, '*');
    });
  }
  const bridgeGetJson = url => bridgeRequest('GET', url).then(t => JSON.parse(t));
  const bridgePostJson = (url, obj) => bridgeRequest('POST', url, JSON.stringify(obj)).then(t => { try { return JSON.parse(t); } catch (_) { return {}; } });
  async function detectBridge() {
    for (let i = 0; i < 6 && !bridgeAvailable; i++) {
      window.postMessage({ __smd: 'ping' }, '*');
      await new Promise(r => setTimeout(r, 250));
    }
    return bridgeAvailable;
  }

  // ---------------- JSONP（GASスナップショット読み取り: ブリッジ不要） ----------------
  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const cb = '__smdJsonp' + (++reqSeq);
      const cleanup = () => { delete window[cb]; s.remove(); };
      const timer = setTimeout(() => { cleanup(); reject(new Error('GAS接続タイムアウト')); }, 15000);
      window[cb] = data => { clearTimeout(timer); cleanup(); resolve(data); };
      const s = document.createElement('script');
      s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
      s.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('GAS読み込みエラー')); };
      document.head.appendChild(s);
    });
  }

  // ---------------- 期間計算 ----------------
  const nowSec = () => Math.floor(Date.now() / 1000);
  const dayStart = tz => { const off = tz * 3600; return Math.floor((nowSec() + off) / 86400) * 86400 - off; };
  function periodParams(region, key) {
    const day0 = dayStart(region.tz);
    if (key === 'real_time')  return { period: 'real_time',  start_time: day0,              end_time: nowSec() };
    if (key === 'yesterday')  return { period: 'yesterday',  start_time: day0 - 86400,      end_time: day0 };
    if (key === 'past7days')  return { period: 'past7days',  start_time: day0 - 7 * 86400,  end_time: day0 };
    if (key === 'past30days') return { period: 'past30days', start_time: day0 - 30 * 86400, end_time: day0 };
    const [y, m] = key.slice(6).split('-').map(Number);
    const offMs = region.tz * 3600 * 1000;
    return { period: 'month',
      start_time: (Date.UTC(y, m - 1, 1) - offMs) / 1000,
      end_time: Math.min((Date.UTC(y, m, 1) - offMs) / 1000, day0) };
  }
  (function fillMonths() {
    const sel = document.getElementById('smd-month');
    const d = new Date();
    for (let i = 0; i < 18; i++) {
      const o = document.createElement('option');
      o.value = `month:${d.getFullYear()}-${d.getMonth() + 1}`;
      o.textContent = `${d.getFullYear()}年${d.getMonth() + 1}月`;
      sel.appendChild(o);
      d.setMonth(d.getMonth() - 1);
    }
  })();

  // ---------------- Shopee mydata API（ブリッジ経由） ----------------
  const trimItem = it => ({
    id: it.id, name: it.name, image: it.image,
    pu: it.placed_units || 0, ps: it.placed_sales || 0, po: it.placed_orders || 0,
    cu: it.confirmed_units || 0, cs: it.confirmed_sales || 0, co: it.confirmed_orders || 0,
    md: (it.models || []).map(m => ({ i: m.id, n: m.name, u: m.placed_units || 0, c: m.confirmed_units || 0, s: m.placed_sales || 0, cs: m.confirmed_sales || 0 }))
      .filter(m => m.u || m.c).slice(0, 30),
  });

  // ---------------- バリエーション画像（get_product_info、ブリッジ経由・遅延取得） ----------------
  const modelImg = new Map();      // "cc:itemId" → {modelId: imageHash}
  const modelImgPending = new Set();
  async function fetchModelImages(region, itemId) {
    const key = `${region.cc}:${itemId}`;
    if (modelImg.has(key) || modelImgPending.has(key)) return;
    modelImgPending.add(key);
    try {
      const j = await bridgeGetJson(`https://${region.host}/api/v3/product/get_product_info?product_id=${itemId}&is_draft=false`);
      const p = (j.data && (j.data.product_info || j.data.product)) || j.data || {};
      const tier = (p.tier_variation && p.tier_variation[0]) || {};
      const imgs = tier.images || [];
      const map = {};
      (p.model_list || []).forEach(m => {
        const idx = m.tier_index && m.tier_index[0];
        if (imgs[idx]) map[m.id] = imgs[idx];
      });
      modelImg.set(key, map);
    } catch (e) {
      modelImg.set(key, {}); // 失敗時は親画像でフォールバック
    }
    modelImgPending.delete(key);
  }
  async function ensureModelImages(entries) {
    const targets = [];
    const seen = new Set();
    entries.forEach(en => {
      const key = `${en.region.cc}:${en.it.id}`;
      if (en.model && !modelImg.has(key) && !seen.has(key)) { seen.add(key); targets.push(en); }
    });
    if (!targets.length) return;
    for (let i = 0; i < targets.length; i += 4) {
      await Promise.all(targets.slice(i, i + 4).map(en => fetchModelImages(en.region, en.it.id)));
    }
    if (state.view === 'sku') renderGrid();
  }

  async function fetchPage(region, pp, pageNum) {
    const qs = new URLSearchParams({
      SPC_CDS_VER: '2', category_id: '-1', category_type: 'shopee', keyword: '',
      order_by: 'placed_sales.desc', order_type: 'placed',
      page_num: String(pageNum), page_size: String(PAGE_SIZE),
      period: pp.period, start_time: String(pp.start_time), end_time: String(pp.end_time),
    });
    const j = await bridgeGetJson(`https://${region.host}/api/mydata/v4/product/performance/?${qs}`);
    if (j.code === 60001) throw new Error('データ集計中（現地深夜帯）。時間をおいて再試行してください');
    if (j.code !== 0) throw new Error(`APIエラー code=${j.code} ${j.msg || ''}`);
    return j.result || { total: 0, items: [] };
  }

  async function fetchCountryLive(region, periodKey, onProgress) {
    const pp = periodParams(region, periodKey);
    const first = await fetchPage(region, pp, 1);
    const total = first.total || 0;
    const pages = Math.min(Math.ceil(total / PAGE_SIZE), MAX_PAGES);
    let raw = first.items || [];
    for (let p = 2; p <= pages; p++) {
      const last = raw[raw.length - 1];
      if (last && !last.placed_sales && !last.placed_units) break;
      onProgress(raw.length, total);
      const res = await fetchPage(region, pp, p);
      if (!res.items || !res.items.length) break;
      raw = raw.concat(res.items);
    }
    return { total, items: raw.map(trimItem) };
  }

  // ---------------- 状態 ----------------
  const state = {
    mode: 'boot',           // boot | live | snap
    periodKey: 'past30days',
    metric: 'placed',
    sortBy: 'units',
    view: 'grid',
    search: '',
    enabled: new Set(REGIONS.map(r => r.cc)),
    perCountry: new Map(),
    snapMeta: null,         // {fetchedAt}
    loadSeq: 0,
  };
  const mv = (it, kind) => {
    if (!it) return 0;
    const k = state.metric === 'confirmed' ? { units: 'cu', sales: 'cs', orders: 'co' } : { units: 'pu', sales: 'ps', orders: 'po' };
    return it[k[kind]] || 0;
  };
  const fmtJpy = n => '¥' + Math.round(n).toLocaleString();
  const fmtLocal = (region, n) => region.cur + Number(n || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });
  const esc = s => String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function setModeBadge() {
    const el = document.getElementById('smd-mode');
    if (state.mode === 'live') { el.className = 'live'; el.textContent = '🟢 ライブ（ブリッジ接続中）'; }
    else if (state.mode === 'snap') {
      el.className = 'snap';
      const t = state.snapMeta && state.snapMeta.fetchedAt ? new Date(state.snapMeta.fetchedAt).toLocaleString('ja-JP') : '不明';
      el.textContent = `🔵 スナップショット（${t} 取得）`;
    } else { el.className = ''; el.textContent = '⚪ 未接続'; }
  }

  // ---------------- 読み込み ----------------
  function loadCountryLive(region, seq) {
    state.perCountry.set(region.cc, { status: 'loading', msg: '読み込み中...', items: [], total: 0 });
    renderSummary();
    fetchCountryLive(region, state.periodKey, (n, t) => {
      if (seq !== state.loadSeq) return;
      const pc = state.perCountry.get(region.cc);
      if (pc) { pc.msg = `読み込み中 ${n}/${t}`; renderSummary(); }
    }).then(({ total, items }) => {
      if (seq !== state.loadSeq) return;
      state.perCountry.set(region.cc, { status: 'ok', msg: '', items, total });
      renderSummary(); renderGrid(); maybeUpload(seq);
    }).catch(e => {
      if (seq !== state.loadSeq) return;
      state.perCountry.set(region.cc, { status: 'error', msg: e.message, items: [], total: 0 });
      renderSummary(); renderGrid();
    });
  }
  function loadAllLive() {
    const seq = ++state.loadSeq;
    REGIONS.filter(r => state.enabled.has(r.cc)).forEach(r => loadCountryLive(r, seq));
    renderGrid();
  }

  async function loadSnapshot() {
    const seq = ++state.loadSeq;
    state.perCountry.clear();
    state.snapMeta = null;
    renderSummary(); renderGrid();
    if (!settings.gasUrl) { state.mode = 'boot'; setModeBadge(); renderGrid(); return; }
    document.getElementById('smd-gridstatus').textContent = 'スナップショットを読み込み中...';
    try {
      const res = await jsonp(`${settings.gasUrl}?fn=get&period=${encodeURIComponent(state.periodKey)}`);
      if (seq !== state.loadSeq) return;
      if (!res.ok || !res.snapshot) throw new Error(res.error || 'この期間のスナップショットはまだ保存されていません');
      const snap = res.snapshot;
      state.snapMeta = { fetchedAt: snap.fetchedAt };
      Object.entries(snap.countries || {}).forEach(([cc, c]) => {
        state.perCountry.set(cc, { status: 'ok', msg: '', items: c.items || [], total: c.total || 0 });
      });
      setModeBadge(); renderSummary(); renderGrid();
    } catch (e) {
      if (seq !== state.loadSeq) return;
      setModeBadge(); renderSummary();
      document.getElementById('smd-grid').innerHTML = `<div id="smd-empty">${esc(e.message)}</div>`;
      document.getElementById('smd-gridstatus').textContent = '';
    }
  }

  const load = () => { state.mode === 'live' ? loadAllLive() : loadSnapshot(); };

  // ---------------- スナップショット保存（ライブ取得後） ----------------
  let uploadTimer = null;
  function maybeUpload(seq) {
    if (!settings.auto || !settings.gasUrl || !settings.token || state.mode !== 'live') return;
    const targets = REGIONS.filter(r => state.enabled.has(r.cc));
    const done = targets.every(r => {
      const pc = state.perCountry.get(r.cc);
      return pc && pc.status !== 'loading';
    });
    if (!done || !targets.some(r => (state.perCountry.get(r.cc) || {}).status === 'ok')) return;
    clearTimeout(uploadTimer);
    uploadTimer = setTimeout(async () => {
      if (seq !== state.loadSeq) return;
      const countries = {};
      targets.forEach(r => {
        const pc = state.perCountry.get(r.cc);
        if (pc && pc.status === 'ok') countries[r.cc] = { total: pc.total, items: pc.items };
      });
      try {
        await bridgePostJson(settings.gasUrl, {
          token: settings.token, fn: 'put', period: state.periodKey,
          snapshot: { fetchedAt: Date.now(), period: state.periodKey, countries },
        });
        console.log('[SMD] スナップショット保存完了:', state.periodKey);
      } catch (e) { console.warn('[SMD] スナップショット保存失敗:', e); }
    }, 800);
  }

  // ---------------- 描画（サマリー / 混合グリッド / 国別縦） ----------------
  function countryRows() {
    const rows = [];
    REGIONS.forEach(region => {
      if (!state.enabled.has(region.cc)) return;
      const pc = state.perCountry.get(region.cc);
      if (!pc || pc.status !== 'ok') return;
      pc.items.forEach(it => {
        const units = mv(it, 'units'), sales = mv(it, 'sales');
        if (!units && !sales) return;
        rows.push({ region, it, units, sales, salesJpy: sales * region.rateJpy });
      });
    });
    if (state.search) {
      const q = state.search.toLowerCase();
      return rows.filter(r => (r.it.name || '').toLowerCase().includes(q) || String(r.it.id).includes(q));
    }
    return rows;
  }

  function renderSummary() {
    const el = document.getElementById('smd-summary');
    el.innerHTML = REGIONS.map(region => {
      const on = state.enabled.has(region.cc);
      const pc = state.perCountry.get(region.cc);
      let body = '<span class="smd-dim">データなし</span>';
      if (on && pc) {
        if (pc.status === 'loading') body = `<span class="smd-dim">${esc(pc.msg)}</span>`;
        else if (pc.status === 'error') body = `<span class="smd-err" title="${esc(pc.msg)}">⚠ ${esc(pc.msg.slice(0, 22))}</span>` +
          (state.mode === 'live' ? `<button class="smd-retry" data-cc="${region.cc}">再試行</button>` : '');
        else {
          const sold = pc.items.filter(it => mv(it, 'units') > 0);
          const units = sold.reduce((s, it) => s + mv(it, 'units'), 0);
          const sales = sold.reduce((s, it) => s + mv(it, 'sales'), 0);
          body = `<b>${units.toLocaleString()}</b>点 / ${fmtLocal(region, sales)}<br><span class="smd-jpy">≈ ${fmtJpy(sales * region.rateJpy)}</span> <span class="smd-dim">${sold.length}商品</span>`;
        }
      }
      return `<div class="smd-tile ${on ? '' : 'off'}" style="border-top-color:${region.color}">` +
        `<label><input type="checkbox" class="smd-cc" data-cc="${region.cc}" ${on ? 'checked' : ''}> <b style="color:${region.color}">${region.cc}</b></label>` +
        `<div class="smd-tilebody">${body}</div></div>`;
    }).join('');
    let units = 0, jpy = 0;
    countryRows().forEach(r => { units += r.units; jpy += r.salesJpy; });
    document.getElementById('smd-total').innerHTML =
      `選択国合計: <b>${units.toLocaleString()}</b>点 / <b>${fmtJpy(jpy)}</b> <span class="smd-dim">(円換算は概算レート)</span>`;
    el.querySelectorAll('.smd-cc').forEach(cb => cb.addEventListener('change', e => {
      const cc = e.target.dataset.cc;
      if (e.target.checked) {
        state.enabled.add(cc);
        const region = REGIONS.find(r => r.cc === cc);
        if (state.mode === 'live' && (!state.perCountry.has(cc) || state.perCountry.get(cc).status === 'error')) {
          loadCountryLive(region, state.loadSeq);
        }
      } else state.enabled.delete(cc);
      renderSummary(); renderGrid();
    }));
    el.querySelectorAll('.smd-retry').forEach(b => b.addEventListener('click', e =>
      loadCountryLive(REGIONS.find(r => r.cc === e.target.dataset.cc), state.loadSeq)));
  }

  function modelsLine(it) {
    const sold = (it.md || []).map(m => ({ n: m.n, u: state.metric === 'confirmed' ? m.c : m.u }))
      .filter(x => x.u > 0).sort((a, b) => b.u - a.u);
    if (!sold.length) return '';
    const txt = sold.map(x => `${x.n}×${x.u}`).join(', ');
    return `<div class="smd-models" title="${esc(txt)}">${esc(txt)}</div>`;
  }

  function renderColumns(grid) {
    grid.className = 'smd-columns';
    const loading = [...state.perCountry.values()].some(pc => pc.status === 'loading');
    const q = state.search.toLowerCase();
    grid.innerHTML = '';
    let shown = 0;
    REGIONS.filter(r => state.enabled.has(r.cc)).forEach(region => {
      const pc = state.perCountry.get(region.cc);
      const col = document.createElement('div');
      col.className = 'smd-col';
      let items = [];
      if (pc && pc.status === 'ok') {
        items = pc.items.filter(it => mv(it, 'units') > 0 || mv(it, 'sales') > 0);
        if (q) items = items.filter(it => (it.name || '').toLowerCase().includes(q) || String(it.id).includes(q));
        items.sort((a, b) => state.sortBy === 'units'
          ? mv(b, 'units') - mv(a, 'units') || mv(b, 'sales') - mv(a, 'sales')
          : mv(b, 'sales') - mv(a, 'sales') || mv(b, 'units') - mv(a, 'units'));
        shown += items.length;
      }
      const units = items.reduce((s, it) => s + mv(it, 'units'), 0);
      const sales = items.reduce((s, it) => s + mv(it, 'sales'), 0);
      const headInfo = pc && pc.status === 'ok'
        ? `<b>${units.toLocaleString()}</b>点 / ${fmtLocal(region, sales)}<br><span class="smd-jpy">≈ ${fmtJpy(sales * region.rateJpy)}</span> <span class="smd-dim">${items.length}商品</span>`
        : (pc && pc.status === 'error'
          ? `<span class="smd-err" title="${esc(pc.msg)}">⚠ ${esc(pc.msg.slice(0, 20))}</span>` +
            (state.mode === 'live' ? `<button class="smd-retry" data-cc="${region.cc}">再試行</button>` : '')
          : `<span class="smd-dim">${esc(pc ? pc.msg : 'データなし')}</span>`);
      col.innerHTML = `<div class="smd-colhead" style="border-top-color:${region.color}">` +
        `<b style="color:${region.color}">${region.cc}</b><div class="smd-colinfo">${headInfo}</div></div>` +
        `<div class="smd-colbody"></div>`;
      const body = col.querySelector('.smd-colbody');
      items.forEach((it, i) => {
        const row = document.createElement('div');
        row.className = 'smd-item';
        row.innerHTML = `<span class="smd-itemrank">${i + 1}</span>` +
          `<img loading="lazy" src="${IMG_CDN}${it.image}" onerror="this.style.opacity=.15">` +
          `<div class="smd-iteminfo"><div class="smd-itemname"></div>` +
          `<div class="smd-itemstats"><b>${mv(it, 'units').toLocaleString()}点</b> ${fmtLocal(region, mv(it, 'sales'))}` +
          ` <span class="smd-jpy">≈${fmtJpy(mv(it, 'sales') * region.rateJpy)}</span></div></div>`;
        row.querySelector('.smd-itemname').textContent = it.name || '';
        row.title = (it.name || '') + '\nクリックで商品編集画面を開く';
        row.addEventListener('click', () => window.open(`https://${region.host}/portal/product/${it.id}`, '_blank'));
        body.appendChild(row);
      });
      if (!items.length && pc && pc.status === 'ok') body.innerHTML = '<div class="smd-colempty">販売なし</div>';
      col.querySelectorAll('.smd-retry').forEach(b => b.addEventListener('click', e =>
        loadCountryLive(REGIONS.find(r => r.cc === e.target.dataset.cc), state.loadSeq)));
      grid.appendChild(col);
    });
    document.getElementById('smd-gridstatus').textContent =
      `${shown}商品を表示中` + (loading ? '（読み込み中の国があります）' : '');
  }

  // SKU展開: バリエーション商品を売れたモデル単位に分解した行を作る
  function skuRows() {
    const rows = [];
    countryRows().forEach(r => {
      const { region, it } = r;
      if (it.md && it.md.length) {
        it.md.forEach(m => {
          const units = state.metric === 'confirmed' ? m.c : m.u;
          const sales = state.metric === 'confirmed' ? (m.cs || 0) : (m.s || 0);
          if (!units && !sales) return;
          rows.push({ region, it, model: m, units, sales, salesJpy: sales * region.rateJpy });
        });
      } else {
        rows.push({ region, it, model: null, units: r.units, sales: r.sales, salesJpy: r.salesJpy });
      }
    });
    if (state.search) {
      const q = state.search.toLowerCase();
      return rows.filter(r => (r.it.name || '').toLowerCase().includes(q) ||
        (r.model && (r.model.n || '').toLowerCase().includes(q)) || String(r.it.id).includes(q));
    }
    return rows;
  }

  function renderSku(grid) {
    grid.className = '';
    const rows = skuRows();
    rows.sort((a, b) => state.sortBy === 'units'
      ? b.units - a.units || b.salesJpy - a.salesJpy
      : b.salesJpy - a.salesJpy || b.units - a.units);
    const loading = [...state.perCountry.values()].some(pc => pc.status === 'loading');
    document.getElementById('smd-gridstatus').textContent =
      `${rows.length} SKUを表示中（バリエーション展開）` + (loading ? '（読み込み中の国があります）' : '');
    grid.innerHTML = '';
    if (!rows.length) {
      grid.innerHTML = `<div id="smd-empty">${loading ? '読み込み中...' : '該当するSKUがありません'}</div>`;
      return;
    }
    const frag = document.createDocumentFragment();
    rows.forEach((r, i) => {
      const { region, it, model } = r;
      const imgMap = modelImg.get(`${region.cc}:${it.id}`) || {};
      const img = (model && imgMap[model.i]) || it.image;
      const card = document.createElement('div');
      card.className = 'smd-card';
      card.innerHTML =
        `<span class="smd-rank">${i + 1}</span>` +
        `<span class="smd-cchip" style="background:${region.color}">${region.cc}</span>` +
        `<div class="smd-imgwrap"><img loading="lazy" src="${IMG_CDN}${img}" onerror="this.style.opacity=.15"></div>` +
        `<div class="smd-body">` +
        `<div class="smd-name" style="font-weight:${model ? '600' : '400'}"></div>` +
        `<div class="smd-nums"><span class="smd-units">${r.units.toLocaleString()}<small> 点</small></span>` +
        `<span class="smd-sales">${fmtLocal(region, r.sales)}</span></div>` +
        `<div class="smd-jpyrow">≈ ${fmtJpy(r.salesJpy)}</div>` +
        `<div class="smd-models"></div>` +
        `<div class="smd-sub"><span>ID ${it.id}</span>` +
        `<a href="https://${region.host}/datacenter/product/performance/details?id=${it.id}" target="_blank" title="詳細分析を開く">📈 詳細</a></div>` +
        `</div>`;
      card.querySelector('.smd-name').textContent = model ? model.n : (it.name || '');
      card.querySelector('.smd-models').textContent = model ? (it.name || '') : '';
      card.title = (model ? model.n + '\n' + it.name : it.name) + '\nクリックで商品編集画面を開く';
      card.addEventListener('click', () => window.open(`https://${region.host}/portal/product/${it.id}`, '_blank'));
      card.querySelector('.smd-sub a').addEventListener('click', e => e.stopPropagation());
      frag.appendChild(card);
    });
    grid.appendChild(frag);
    // バリエーション画像を裏で取得して差し替え（ライブモードのみ可能）
    if (state.mode === 'live') ensureModelImages(rows);
  }

  function renderGrid() {
    const grid = document.getElementById('smd-grid');
    if (state.view === 'columns') return renderColumns(grid);
    if (state.view === 'sku') return renderSku(grid);
    grid.className = '';
    const rows = countryRows();
    rows.sort((a, b) => state.sortBy === 'units'
      ? b.units - a.units || b.salesJpy - a.salesJpy
      : b.salesJpy - a.salesJpy || b.units - a.units);
    const loading = [...state.perCountry.values()].some(pc => pc.status === 'loading');
    document.getElementById('smd-gridstatus').textContent =
      `${rows.length}商品を表示中` + (loading ? '（読み込み中の国があります）' : '');
    grid.innerHTML = '';
    if (!rows.length) {
      grid.innerHTML = `<div id="smd-empty">${loading ? '読み込み中...' :
        (state.mode === 'boot' ? 'ブリッジ未検出＆GAS未設定です。⚙️設定からGAS URLを入れるか、ブリッジuserscript入りのPCで開いてください' : '該当する商品がありません')}</div>`;
      return;
    }
    const frag = document.createDocumentFragment();
    rows.forEach((r, i) => {
      const { region, it } = r;
      const card = document.createElement('div');
      card.className = 'smd-card';
      card.innerHTML =
        `<span class="smd-rank">${i + 1}</span>` +
        `<span class="smd-cchip" style="background:${region.color}">${region.cc}</span>` +
        `<div class="smd-imgwrap"><img loading="lazy" src="${IMG_CDN}${it.image}" onerror="this.style.opacity=.15"></div>` +
        `<div class="smd-body">` +
        `<div class="smd-name"></div>` +
        `<div class="smd-nums"><span class="smd-units">${r.units.toLocaleString()}<small> 点</small></span>` +
        `<span class="smd-sales">${fmtLocal(region, r.sales)}</span></div>` +
        `<div class="smd-jpyrow">≈ ${fmtJpy(r.salesJpy)}</div>` +
        modelsLine(it) +
        `<div class="smd-sub"><span>ID ${it.id}</span>` +
        `<a href="https://${region.host}/datacenter/product/performance/details?id=${it.id}" target="_blank" title="詳細分析を開く">📈 詳細</a></div>` +
        `</div>`;
      card.querySelector('.smd-name').textContent = it.name || '';
      card.title = (it.name || '') + '\nクリックで商品編集画面を開く';
      card.addEventListener('click', () => window.open(`https://${region.host}/portal/product/${it.id}`, '_blank'));
      card.querySelector('.smd-sub a').addEventListener('click', e => e.stopPropagation());
      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }

  // ---------------- コントロール ----------------
  const segHandler = (segId, apply, refetch) => {
    document.querySelector(segId).addEventListener('click', e => {
      const b = e.target.closest('button');
      if (!b) return;
      document.querySelectorAll(`${segId} button`).forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      apply(b.dataset.k);
      if (refetch) { document.getElementById('smd-month').value = ''; load(); }
      else { renderSummary(); renderGrid(); }
    });
  };
  segHandler('#smd-period', k => { state.periodKey = k; }, true);
  segHandler('#smd-metric', k => { state.metric = k; }, false);
  segHandler('#smd-sort',   k => { state.sortBy = k; }, false);
  segHandler('#smd-view',   k => { state.view = k; }, false);
  document.getElementById('smd-month').addEventListener('change', e => {
    if (!e.target.value) return;
    state.periodKey = e.target.value;
    document.querySelectorAll('#smd-period button').forEach(x => x.classList.remove('on'));
    load();
  });
  let searchTimer;
  document.getElementById('smd-search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { state.search = e.target.value.trim(); renderGrid(); }, 200);
  });

  // 設定モーダル
  const modal = document.getElementById('smd-modal');
  document.getElementById('smd-gear').addEventListener('click', () => {
    document.getElementById('set-gas').value = settings.gasUrl;
    document.getElementById('set-token').value = settings.token;
    document.getElementById('set-auto').checked = settings.auto;
    document.getElementById('set-test').textContent = '';
    modal.classList.add('open');
  });
  document.getElementById('set-cancel').addEventListener('click', () => modal.classList.remove('open'));
  document.getElementById('set-save').addEventListener('click', () => {
    settings.gasUrl = document.getElementById('set-gas').value.trim().replace(/\/$/, '');
    settings.token = document.getElementById('set-token').value.trim();
    settings.auto = document.getElementById('set-auto').checked;
    saveSettings();
    modal.classList.remove('open');
    if (state.mode !== 'live') load();
  });
  document.getElementById('set-testbtn').addEventListener('click', async () => {
    const el = document.getElementById('set-test');
    const url = document.getElementById('set-gas').value.trim().replace(/\/$/, '');
    if (!url) { el.textContent = 'URLを入力してください'; return; }
    el.textContent = 'テスト中...';
    try {
      const res = await jsonp(`${url}?fn=list`);
      el.textContent = res.ok ? `✅ 接続OK（保存済み: ${(res.periods || []).length}期間）` : '⚠ 応答が不正です';
    } catch (e) { el.textContent = '❌ ' + e.message; }
  });

  // ---------------- 起動 ----------------
  (async function boot() {
    setModeBadge();
    renderSummary();
    const hasBridge = await detectBridge();
    state.mode = hasBridge ? 'live' : (settings.gasUrl ? 'snap' : 'boot');
    setModeBadge();
    load();
  })();
})();
</script>
</body>
</html>
